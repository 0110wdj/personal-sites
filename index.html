<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1d1d1f;
        }
        .container {
            text-align: center;
        }
        .hint {
            font-size: 1.2rem;
            opacity: 0.6;
            max-width: 500px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="hint">
            这是个人主页集合站点，请通过指定路径访问对应个人主页。
        </p>
    </div>
</body>
</html>
